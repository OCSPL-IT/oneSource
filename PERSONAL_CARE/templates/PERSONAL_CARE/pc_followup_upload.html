{% extends "main/index.html" %}
{% block maincontent %}
<div class="max-w-3xl mx-auto py-8 px-4">
  <div class="bg-white shadow rounded-lg p-6">
    <h1 class="text-lg font-semibold text-slate-800">Upload Customer Follow-ups (Excel)</h1>
    <p class="text-sm text-slate-600 mt-1">
      Upload .xlsx file with headers: Date, Customer Name, Customer Profile, Mode of Follow-up, Stage, Follow-up Status, Executive Name
    </p>

    <form method="post" enctype="multipart/form-data" class="mt-5">
      {% csrf_token %}
      <label class="block text-sm font-medium text-slate-700 mb-2">Choose Excel file</label>
      <input type="file" name="file" accept=".xlsx,.xls"
             class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm" required>

      <div class="mt-4 flex gap-2">
        <button type="submit"
                class="px-4 py-2 rounded-md bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700">
          Preview Import
        </button>
        <a href="{% url 'pc_task_list' %}"
           class="px-4 py-2 rounded-md border border-slate-300 text-sm font-medium hover:bg-slate-50">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
