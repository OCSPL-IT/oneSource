{% extends "main/index.html" %}
{% block title %}Delete Production Budget{% endblock %}

{% block maincontent %}
<div class="min-h-[calc(100vh-6rem)] bg-slate-50">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
      <h1 class="text-xl font-semibold text-slate-900">Delete Production Budget</h1>

      <div class="mt-3 text-slate-700">
        <p>
          You are about to delete the Production Budget for:
          <span class="font-semibold text-slate-900">{{ fg_name }}</span>
        </p>
        <p class="mt-2 text-sm text-slate-500">
          This action cannot be undone.
        </p>
      </div>

      <div class="mt-6 flex items-center gap-3">
        <form method="post" action="">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit"
                  class="inline-flex items-center px-4 py-2 rounded-lg bg-red-600 text-white font-semibold hover:bg-red-700">
            Delete
          </button>
        </form>

        <a href="{{ next }}"
           class="inline-flex items-center px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">
          Cancel
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
