{# qc/templates/qc/sample_description_form.html #}
{% extends "base.html" %}
{% block content %}
  <div class="admin-card">
    <h1><i class="fa-solid fa-plus-circle"></i> Add Sample Description</h1>

    <form id="desc-form" method="post" action="{% url 'qc:sample_description_form' %}">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_name" class="form-label">Name</label>
        <input type="text" name="name" id="id_name"
               class="form-control" required>
      </div>

      <div class="d-flex justify-content-end">
        <button type="button" id="btn-cancel" class="btn btn-secondary me-2">
          Cancel
        </button>
        <button type="submit" name="save_return" value="1"
                class="btn btn-primary me-2">
          Save & Return
        </button>
        <button type="submit" class="btn btn-outline-primary">
          Save & Add Another
        </button>
      </div>
    </form>
  </div>

  <script>
    (function(){
      const form = document.getElementById('desc-form');

      // just close popup on cancel
      document.getElementById('btn-cancel').onclick = () => window.close();

      form.onsubmit = async function(e){
        e.preventDefault();
        const fd = new FormData(form);
        const res = await fetch(form.action, { method:'POST', body:fd });
        if (!res.ok) return alert('Error saving');
        const json = await res.json();

        // post back to opener
        window.opener.postMessage({
          id: json.id,
          name: json.name,
          action: fd.get('save_return') ? 'save_return' : 'save_add'
        }, window.location.origin);

        if (fd.get('save_return')) {
          window.close();
        } else {
          form.reset();
          document.getElementById('id_name').focus();
        }
      };
    })();
  </script>
{% endblock %}
