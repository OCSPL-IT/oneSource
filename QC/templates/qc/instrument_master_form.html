{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Instrument Master – Add New</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Inter',sans-serif;background:#f5f7fb;margin:0;color:#333}
    .wrap{max-width:900px;margin:32px auto;padding:0 24px}
    .card{background:#fff;border:1px solid #e0e7ed;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.05);padding:24px}
    h2{font-weight:700;color:#1e40af;margin-bottom:20px}
    .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
    label{font-weight:600;margin-bottom:6px;color:#111}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-size:.95rem}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
    .form-actions{margin-top:24px;display:flex;gap:10px}
    .btn{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:600;cursor:pointer}
    .btn:hover{background:#1e40af}
    .btn.secondary{background:#fff;color:#111;border:1px solid #ccc}
    .btn.secondary:hover{background:#f0f4f8}
    .hint{color:#6b7280;font-size:13px;margin-top:3px}
  </style>
</head>
<body>
<div class="wrap">
  <h2>Add / Edit QC Instrument</h2>

  <form method="post" class="card">
    {% csrf_token %}
    <div class="grid">
      <div>
        <label for="{{ form.name.id_for_label }}">Instrument Name</label>
        {{ form.name }}
      </div>
      <div>
        <label for="{{ form.code.id_for_label }}">Instrument ID / Code</label>
        {{ form.code }}
        <div class="hint">Example: OCSPL/QC/GC/001</div>
      </div>
      <div>
        <label for="{{ form.category.id_for_label }}">Category</label>
        {{ form.category }}
        <div class="hint">E.g. GC, HPLC, KF, UV, etc.</div>
      </div>
      <div>
        <label for="{{ form.is_active.id_for_label }}">Active?</label><br>
        {{ form.is_active }}
      </div>
      <div style="grid-column:1/-1">
        <label for="{{ form.notes.id_for_label }}">Notes</label>
        {{ form.notes }}
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn">Save</button>
      <a href="{% url 'qc:instrument_master' %}" class="btn secondary">Back to List</a>
    </div>
  </form>
</div>
</body>
</html>
