{% extends "main/index.html" %}
{% block title %}Power BI Dashboard{% endblock %}

{% block maincontent %}
<div class="min-h-screen bg-slate-100 py-6">
  <div class="max-w-7xl mx-auto px-4">

    <div class="flex items-center justify-between mb-4">
  <h1 class="text-2xl font-semibold text-slate-800">QC Dashboard</h1>

  <!-- Right side buttons -->
  <div class="flex items-center gap-3">
    <a href="{% url 'qc:qc_dashboard' %}"
       class="inline-flex items-center justify-center rounded-md bg-slate-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-blue-700">
      oneSource dashboard
    </a>

    <a href="{% url 'indexpage' %}"
       class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-blue-700">
      Back
    </a>
  </div>
</div>


    <div class="bg-white rounded-xl shadow-md overflow-hidden">
      <!-- IMPORTANT: wrapper is relative -->
      <div id="pbiWrap" class="relative w-full" style="height: 800px;">

        <iframe
          id="pbiFrame"
          title="Power BI Dashboard"
          src="{{ powerbi_url }}"
          class="w-full h-full"
          frameborder="0"
          allowfullscreen="true">
        </iframe>

        <!-- ✅ Mask FULL bottom footer bar (hides Microsoft Power BI + share icons + zoom etc.) -->
        <div
          class="absolute left-0 bottom-0 w-full"
          style="height: 64px; background: #e5e7eb; pointer-events: none;">
        </div>

        <!-- ✅ Re-create ONLY the fullscreen button (bottom-right) -->
        <button
          type="button"
          id="pbiFullscreenBtn"
          class="absolute bottom-3 right-3 inline-flex items-center justify-center rounded-md bg-white border border-slate-300 shadow px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50"
          title="Full screen">
          ⛶
        </button>

      </div>
    </div>

  </div>
</div>

<script>
  (function () {
    const wrap = document.getElementById("pbiWrap");
    const btn  = document.getElementById("pbiFullscreenBtn");

    async function goFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await wrap.requestFullscreen();
        }
      } catch (e) {
        console.error("Fullscreen failed:", e);
      }
    }

    btn.addEventListener("click", goFullscreen);

    // Optional: change height when in fullscreen
    document.addEventListener("fullscreenchange", () => {
      if (document.fullscreenElement === wrap) {
        wrap.style.height = "100vh";
      } else {
        wrap.style.height = "800px";
      }
    });
  })();
</script>
{% endblock %}
