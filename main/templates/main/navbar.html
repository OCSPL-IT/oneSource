{% load static %}

<header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
  <div class="mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Left: Global toggle + Title -->
      <div class="flex items-center gap-3">
        <!-- ONE BUTTON for all breakpoints -->
        <button
          @click="isSidebarOpen = !isSidebarOpen"
          :aria-expanded="isSidebarOpen.toString()"
          aria-controls="app-sidebar"
          class="inline-flex items-center justify-center w-10 h-10 rounded-md hover:bg-gray-100 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          title="Toggle sidebar"
        >
          <i class="fa-solid" :class="isSidebarOpen ? 'fa-chevron-left' : 'fa-bars'"></i>
          <span class="sr-only">Toggle sidebar</span>
        </button>

        <h1 class="text-2xl font-bold text-gray-800">
          Welcome, {{ user.first_name|default:user.username }}!
        </h1>
      </div>

      <!-- Right: Profile -->
      <div class="flex items-center">
        <div x-data="{ open: false }" class="relative">
          <button @click="open = !open"
                  class="flex items-center gap-2 bg-white px-3 py-1.5 text-sm font-medium text-gray-600 border rounded-full hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <i class="fa-solid fa-user"></i>
            <span class="hidden sm:block">{{ user.username }}</span>
            <i class="fa-solid fa-chevron-down fa-xs text-gray-400"></i>
          </button>
          <div x-show="open" @click.outside="open = false" x-cloak x-transition
               class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg ring-1 ring-black/5 py-1">
            {% if request.user.is_superuser or request.user.is_staff %}
            <a href="/admin/" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fa-solid fa-user-shield mr-3 text-gray-400"></i> Admin Panel
            </a>
            {% endif %}
            {% if request.user.is_superuser %}
            <a href="{% url 'audit_log_list' %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fa-solid fa-file-lines mr-3 text-gray-400"></i> Audit Log
            </a>
            {% endif %}
            <a href="{% url 'userlogout' %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fa-solid fa-right-from-bracket mr-3 text-gray-400"></i> Logout
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</header>
