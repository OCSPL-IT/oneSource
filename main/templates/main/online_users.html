{% extends "main/index.html" %}
{% load static %}
{% block maincontent %}
<div class="p-4 sm:p-6 bg-slate-100 min-h-screen">
  <div class="max-w-screen-xl mx-auto">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold text-slate-900">{{ title }}</h1>
      <a href="{% url 'login_activity' %}" class="text-indigo-600 font-semibold hover:underline">View Login History →</a>
    </div>

    <form method="get" class="flex gap-2 mb-4">
      <input name="q" value="{{ q }}" placeholder="Search username / email"
             class="w-64 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      <button class="rounded-lg bg-indigo-600 text-white px-4 py-2 text-sm font-semibold">Search</button>
      <a href="{% url 'online_users' %}" class="rounded-lg px-4 py-2 text-sm font-semibold border border-slate-300 bg-white">Clear</a>
    </form>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-slate-700 text-xs uppercase tracking-wide">
          <tr>
            <th class="px-4 py-2 text-left">User</th>
            <th class="px-4 py-2 text-left">Email</th>
            <th class="px-4 py-2 text-left">Last Seen (IST)</th>
          </tr>
        </thead>
        <tbody>
          {% for s in users %}
            <tr class="border-t border-slate-100 hover:bg-slate-50">
              <td class="px-4 py-2 font-medium">{{ s.user.username }}</td>
              <td class="px-4 py-2">{{ s.user.email }}</td>
              <td class="px-4 py-2">{{ s.last_seen|date:"Y-m-d H:i:s" }}</td>
            </tr>
          {% empty %}
            <tr><td class="px-4 py-6 text-center text-slate-500" colspan="3">No users online.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
